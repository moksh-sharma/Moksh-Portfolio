[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Skip Next.js runtime when the site is still linked to @netlify/plugin-nextjs but this
  # repo is Vite (dist/ only). Remove the plugin in Netlify UI if this env ever stops working.
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Vite static site (publish: dist). If builds still fail on the Next plugin, remove
# @netlify/plugin-nextjs: Site configuration → Integrations / Build plugins.

# SPA fallback: real files (e.g. /assets/*) are served first; unmatched paths get index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
