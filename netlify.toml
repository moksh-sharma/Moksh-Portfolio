[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# This site is Vite + React (static dist/), not Next.js. If the Netlify UI still has
# "@netlify/plugin-nextjs" from an old setup, disable it here so the build can finish.
[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false

# SPA fallback: real files (e.g. /assets/*) are served first; unmatched paths get index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
